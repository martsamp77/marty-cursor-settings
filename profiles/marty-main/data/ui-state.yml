  one)\",\"name\":\"userGuidanceLevel\",\"type\":\"single\"}],\"systemPrompt\":\
  \"You are given a conversation between a user and an AI coding assistant. Your
  task is to classify the conversation along the following five axes:\\n- The
  primary task category (what type of coding work is being done)\\n- The
  complexity of the task (how hard is it for the agent to complete)\\n- The
  user's intent (what they're trying to accomplish)\\n- The specific focus areas
  (subcategories)\\n- The user guidance level (how much direction/specificity
  the user provides)\\n\\nCarefully analyze the conversation content, paying
  attention to what the user is asking for and how the assistant
  responds.\\n\\nIMPORTANT - Complexity vs User Guidance Level:\\n- 'complexity'
  measures how difficult the TASK is for the agent (e.g., a large refactor is
  high complexity)\\n- 'userGuidanceLevel' measures how much GUIDANCE the user
  provides (e.g., \\\"fix this\\\" is low guidance, specific file/function
  references is high guidance)\\n- These are independent: a simple task can have
  low user guidance (\\\"fix the bug\\\") or high guidance (\\\"fix the null
  check on line 42 in utils.ts\\\")\\n- A complex task can have high guidance
  (detailed spec) or low guidance (vague requirements)\\n\\nOutput rules:\\n-
