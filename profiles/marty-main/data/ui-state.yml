  :{\"maxChatsToRead\":100,\"maxProjectsToGroup\":5,\"model\":\"fiercefalcon\",\
  \"promptTemplate\":\"You are analyzing conversation transcripts to identify
  repeated user behaviors.\\n\\n## Transcript Location\\nTranscripts are stored
  at: {{agentTranscriptsPath}}\\n\\n## Transcript Format\\nEach '.txt' file is a
  human-readable conversation transcript with this structure:\\n- 'user:'
  sections contain user messages (often wrapped in '<user_query>' tags)\\n-
  'assistant:' sections contain assistant responses\\n- '[Tool call]' blocks
  show which tools were invoked\\n- '[Tool result]' blocks show tool
  outputs\\n\\nFiles can be large. Focus on extracting the '<user_query>'
  sections which contain the actual user requests. Do NOT try to read the entire
  file contents because it will pollute your context.\\n\\n## How to Read
  Transcripts\\n1. Use Glob to list files:
  \\\"{{agentTranscriptsPath}}/*.txt\\\"\\n2. For each file, extract just the
  '<user_query>' blocks - these show what users asked for\\n3. You can use Grep
  to search for '<user_query>' patterns across files. If you try and run
  terminal commands they will be rejected.\\n\\n## Task\\nAnalyze the
  {{maxChatsToRead}} most recent conversations (by file modification time). Be
  thorough and do not bias towards recency when analyzing conversations. Ignore
  trivial conversations and conversations where nothing concrete
  happened.\\n\\nYour goal is to understand how the user interacts with the
  agent. Focus especially on the corrections that the user makes repeatedly.
  Focus on common terminal commands/workflows the user instructs the agent to
  do, changes, and other very stable patterns.\\n\\n## Evidence Standards\\nWhen
  making claims about what the agent SHOULD or SHOULD NOT do, only cite
  conversations where:\\n- The user explicitly corrected the agent for doing
  something wrong\\n- The user undid or rejected an agent action\\n- The user
  gave an explicit instruction ('don\\\\\\\\'t do X', 'always do Y')\\n\\nDo NOT
  infer 'don\\\\\\\\'t do X' from:\\n- The user asking a question about X (e.g.,
  'should we add tests?' does not mean 'don\\\\\\\\'t add tests
  proactively')\\n- The user doing X themselves (doesn't mean the agent
  shouldn't)\\n- Absence of the agent doing X\\n\\nFor each claim, ask: 'Is
  there a conversation where the user pushed back on the agent for doing this?'
  If not, don't include it as a guideline. For each piece of information you
  discern, you must cite 4 conversations. For each citation, verify that the
  conversation actually backs up your claim. Never include direct quotes from
  user messages; summarize at a high level.\\n\\nThese are the sections to
  cover. Do not overlap these with existing user and project rules; if there is
  overlap or conflict always go with the existing rules.\\n\\n- Developer
  profile: How does the user interact with the agent. Focus on how much autonomy
  they like to give the agent vs. how much they would like to oversee the
  changes the agent is making. What is their workflow for getting tasks done.
  What kind of tasks do they often work on. Verify across many conversations,
  and do not extrapolate too hard.\\n- Important terminal commands: Terminal
  commands/workflows the user runs repeatedly that are unique to the
  project/user workflow, and when they should be used. Focus on test, lint, and
  build commands. Do not include git commands.\\n\\nDo not write any files in
  this step. You will be asked in a follow-up message to write the final user
  profile to disk. Split your work into batches, and make sure you cover each
  batch independently and then synthesize. This is to ensure you aren't biased
  towards recent transcripts! If you see a VERBATIM repeated user query, that's
  probably a sign of automated conversation tooling and you should discard it
  from your analysis of the user.\",\"secondStepPromptTemplate\":\"The output so
  far was written by a less intelligent model. Start by a critique of the
  analysis so far, to find things that are task specific and not truly
  consistent across all the batches. If there is meaningful information left
  after your critique, turn your analysis into a concise 'index.md' markdown
  file that will be shown to all agents in the future.\\n\\nWrite the file
  contents to: {{userIntentDirPath}}\\n(This is a temporary file path and will
  be atomically moved to {{finalUserIntentDirPath}}.) You can use the mkdir
  terminal command, that is all. \\n\\nRequirements:\\n- Do not cite user
  messages or transcripts directly (no quotes)\\n- Avoid overly specific task
  details; focus on stable patterns and preferences\\n- Don't duplicate
  information with user or project rules.\\n Make sure to include the user's
  derived autonomy preference, and validate the autonomy preference by making
  sure it's something present in all the conversations, not just the most recent
  ones. DO NOT include information already stored in rules. If information
  conflicts with rules, do not include it in the
  index.\"}},\"4195147964\":{\"group\":\"launchedGroup\",\"group_name\":\"Test\
