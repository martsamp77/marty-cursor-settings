  technologies.\",\"name\":\"Learning\"}]},{\"description\":\"How much guidance
  and specificity the user provides in their request (measures user's upfront
  cognitive work, not task
  difficulty)\",\"name\":\"user_guidance_levels\",\"values\":[{\"description\":\
  \"User provides highly specific, disciplined requests with clear context.
  Mentions specific files, functions, or line numbers. Includes acceptance
  criteria or expected behavior. Shows deep understanding of the codebase. Low
  ambiguity - the agent knows exactly what to do.\",\"examples\":[\"Add retry
