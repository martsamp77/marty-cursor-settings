  re-render loop on line 45 because the dependency array includes the entire
  user object instead of user.id\",\"Refactor the PaymentService class to use
  the Strategy pattern - extract the payment processing logic into separate
  classes for Stripe, PayPal, and Apple
  Pay\"],\"name\":\"high\"},{\"description\":\"User provides general direction
  with some specifics but leaves implementation details to the agent. May
  reference general areas of the codebase. Some ambiguity in
  approach.\",\"examples\":[\"Add error handling to the API calls\",\"The
  authentication is broken, I think it's something with the token
  refresh\",\"Make the dashboard load faster\",\"Add validation to the form
  inputs\"],\"name\":\"medium\"},{\"description\":\"User provides vague,
