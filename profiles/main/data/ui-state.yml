  ies\",\"description\":\"Specific focus areas (pick 0-2 that best
  apply)\",\"maxItems\":2,\"name\":\"subcategories\",\"type\":\"array\"},{\"cat\
  egoryRef\":\"user_guidance_levels\",\"description\":\"How much
  guidance/specificity the user provides - measures user's upfront work, not
  task difficulty (pick exactly
  one)\",\"name\":\"userGuidanceLevel\",\"type\":\"single\"}],\"systemPrompt\":\
  \"You are given a conversation between a user and an AI coding assistant. Your
  task is to classify the conversation along the following five axes:\\n- The
  primary task category (what type of coding work is being done)\\n- The
  complexity of the task (how hard is it for the agent to complete)\\n- The
  user's intent (what they're trying to accomplish)\\n- The specific focus areas
  (subcategories)\\n- The user guidance level (how much direction/specificity
  the user provides)\\n\\nCarefully analyze the conversation content, paying
  attention to what the user is asking for and how the assistant
  responds.\\n\\nIMPORTANT - Complexity vs User Guidance Level:\\n- 'complexity'
  measures how difficult the TASK is for the agent (e.g., a large refactor is
  high complexity)\\n- 'userGuidanceLevel' measures how much GUIDANCE the user
  provides (e.g., \\\"fix this\\\" is low guidance, specific file/function
  references is high guidance)\\n- These are independent: a simple task can have
  low user guidance (\\\"fix the bug\\\") or high guidance (\\\"fix the null
  check on line 42 in utils.ts\\\")\\n- A complex task can have high guidance
  (detailed spec) or low guidance (vague requirements)\\n\\nOutput rules:\\n-
  For each output field, choose ONLY from the allowed values listed under that
  field. Do not invent new values.\\n- Use the value names exactly (case and
  spacing). Example: \\\"Write Code\\\" (not \\\"WriteCode\\\").\\n- Do not copy
  values across axes (e.g., do not use subcategory labels as categories, and do
  not use category labels as intent).\\n\\nImportant rules:\\n- Use 'Bug Fixing
  & Debugging' for any work investigating or fixing bugs, errors, or crashes\\n-
  Use 'New Features' if adding functionality, even if some refactoring is
  needed\\n- Default to 'medium' complexity when unsure\\n- Use 'Ask' for
  information gathering, 'Plan' for approach discussion, 'Write Code' for actual
  changes\\n- For userGuidanceLevel: evaluate ONLY the user's messages (ignore
  assistant messages/tool calls). Look for specific file paths, function names,
  line numbers, acceptance criteria (high); general directions (medium);
  vague/reactive requests like \\\"fix this\\\" or \\\"not working\\\" (low)\\n-
  Subcategories should be empty unless a clear domain focus is
  present.\",\"version\":\"1.3.1\"}},\"3170039990\":{\"group\":\"prestart\",\"i\
